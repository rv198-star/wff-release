interface:
  display_name: "Phase-3 Frontend Implementation"
  short_description: "Implement web surfaces from frozen contracts and prototype truth"
  default_prompt: "Use $wff-impl-frontend to implement a bounded Phase-3 web packet from the frozen contract, generated API client, shared types, and prototype surfaces. Before any implementation work, enforce the pre-execution gate: refuse execution if assigned pages do not have explicit page_blueprint_type coverage, non-generic interaction patterns, defined page component regions, complete core interaction authority (`service_binding_id`, `domain_service`, `api_endpoint`, request/response field mapping, and flow fields when applicable), or if any assigned page/compiled interaction is marked `blocked`, `review-bound`, or `stale`. If the gate fails, return the structured refusal format `PHASE-3 FRONTEND EXECUTION REFUSED` with Reason, Required upstream action, and Affected pages. First translate each assigned surface into a page-specific implementation design with explicit business-state transitions, then bind it to the contract. Reject generic renderers, API-explorer patterns, api-endpoint-inferred layout decisions, visible prototype metadata, and underconstrained authority that would force the model to guess page/service/flow truth. Keep loading/empty/denied/error states explicit and default to HTML2Code unless a real Figma source exists."
